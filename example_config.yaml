name: "books_toscrape"
start_url: "https://books.toscrape.com/catalogue/category/books_1/page-1.html"
engine: "static"

delay:
  min: 1.0
  max: 2.5

pagination:
  type: "next_selector"
  selector: "li.next a"
  max_pages: 3

output:
  format: "csv"
  file: "books_output.csv"

extraction:
  items_selector: "article.product_pod"
  fields:
    title:
      selector: "h3 a"
      attr: "title"
    price:
      selector: "p.price_color"
      attr: "text"
      transform: "clean_price"
    link:
      selector: "h3 a"
      attr: "href"
      transform: "absolute_url"
    image_url:
      selector: "div.image_container img"
      attr: "src"
      transform: "absolute_url"
